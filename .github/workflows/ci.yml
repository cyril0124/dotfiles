name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 9 * * 1" # Every Monday 09:00 UTC

jobs:
  bootstrap:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache pixi envs
        uses: actions/cache@v4
        with:
          path: ~/.pixi
          key: ${{ runner.os }}-pixi-${{ hashFiles('pixi/pixi-global.toml') }}
          restore-keys: ${{ runner.os }}-pixi-

      - name: Cache nvim lazy plugins
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nvim/lazy
          key: ${{ runner.os }}-nvim-lazy-${{ hashFiles('config/nvim/lazy-lock.json') }}
          restore-keys: ${{ runner.os }}-nvim-lazy-

      - name: Cache nvim mason packages
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nvim/mason
          key: ${{ runner.os }}-nvim-mason-${{ hashFiles('config/nvim/lua/plugins/**') }}
          restore-keys: ${{ runner.os }}-nvim-mason-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh build-essential

      - name: First bootstrap run
        timeout-minutes: 45
        env:
          DOTFILES_CI: "1"
        run: |
          ./bootstrap
          echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"

      - name: Second bootstrap run (idempotency)
        timeout-minutes: 30
        env:
          DOTFILES_CI: "1"
        run: ./bootstrap dotfiles shell pixi tmux_conf opencode claude codex

      - name: Test bootstrap
        run: ./tests/test_bootstrap.sh

      - name: Test neovim
        timeout-minutes: 10
        run: ./tests/test_nvim.sh
